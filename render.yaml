services:
  - type: web
    name: eight25-website-audit-tool
    runtime: node
    plan: free
    branch: main
    buildCommand: npm install && npm run build
    startCommand: npm run start
    autoDeploy: true
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: OLLAMA_BASE_URL
        value: https://ollama.com
      - key: OLLAMA_MODEL
        value: gpt-oss:120b
      - key: OLLAMA_API_KEY
        sync: false
      - key: NEXT_PUBLIC_APP_NAME
        value: Website Audit Tool
