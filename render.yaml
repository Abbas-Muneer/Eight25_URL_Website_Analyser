services:
  - type: web
    name: eight25-website-audit-tool
    runtime: docker
    plan: free
    branch: main
    dockerfilePath: ./Dockerfile
    dockerContext: .
    autoDeploy: true
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: OLLAMA_BASE_URL
        value: https://ollama.com
      - key: OLLAMA_MODEL
        value: gpt-oss:120b
      - key: OLLAMA_API_KEY
        sync: false
      - key: NEXT_PUBLIC_APP_NAME
        value: Website Audit Tool
